# R&R baselines — few-shot and chain-of-thought (reviewer 2 #6).
# Single-turn conditions (batched, fast), the four 4-bit models, full 2,000 samples.
# Additive & isolated: writes to results/past_runs/baselines/, no Hub push.

hardware: mlx

models:
  - gemma2_9b
  - llama3_8b
  - mistral_7b
  - qwen2_7b
model_configs:
  gemma2_9b:
    hf: google/gemma-2-9b-it
    mlx: mlx-community/gemma-2-9b-it-4bit
  llama3_8b:
    hf: meta-llama/Meta-Llama-3.1-8B-Instruct
    mlx: mlx-community/Meta-Llama-3.1-8B-Instruct-4bit
  mistral_7b:
    hf: mistralai/Mistral-7B-Instruct-v0.3
    mlx: mlx-community/Mistral-7B-Instruct-v0.3-4bit
  qwen2_7b:
    hf: Qwen/Qwen2.5-7B-Instruct
    mlx: mlx-community/Qwen2.5-7B-Instruct-4bit

conditions:
  - few_shot
  - cot

results_dir: results/past_runs/baselines
run_type: baselines
push_to_hub: false
hub_repo: ""

prompts_dir: prompts
skills_dir: skills
label_map_path: config/pii_label_to_piicodex.json

seed: 42
prompt_version: v1

max_tokens: 1536        # headroom for chain-of-thought reasoning before the JSON
max_turns: 1
max_seconds_per_sample: 120
batch_size: 12
batch_size_parallel: 12
multi_turn_workers: 1
purge_hf_cache_after_model: false   # 4-bit models are small and shared with the main run
debug: false
